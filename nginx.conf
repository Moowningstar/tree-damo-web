server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback - all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy is not needed - frontend connects directly to Railway backend
    # via VITE_API_BASE_URL environment variable
    #
    # If you want to proxy API requests through nginx instead:
    # 1. Uncomment the location block below
    # 2. Update frontend code to use relative URLs (/api/chat instead of full URL)
    # 3. Remove or comment out VITE_API_BASE_URL in .env
    #
    # location /api/ {
    #     proxy_pass https://three-damo-production.up.railway.app/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    # }
}
